[options]
isa rv32im
nret 1
solver bitwuzla

[depth]
# BMC depth per check. 2nd column (where present) is the k-induction prove
# depth. Keep depths matched to the current pipeline so bugs within ~20
# cycles of any symbolic instruction stream are exposed.
insn          20
reg       10  20
pc_fwd    10  20
pc_bwd    10  20
causal    10  20
# unique   — no two retirements share rvfi_order (catches double-retire)
# cover    — sanity that the CPU retires (prevents vacuous-pass suites)
# ill      — illegal instructions must trap; rvfi_trap from decoder.is_illegal
# liveness — CPU makes forward progress under any symbolic stream
unique     1 10 20
cover      1    20
ill             20
liveness   1 10 20

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
# RISCV_FORMAL_ALTOPS — fast mode. Same as checks.cfg. See checks.cfg for
# the full rationale on what ALTOPS does and does not prove. M-extension
# arithmetic correctness is covered by test/test_alu.py and `make formal-deep`.
`define RISCV_FORMAL_ALTOPS

[cover]
# Sanity cover: the CPU must retire at least one non-trapping instruction.
always @* if (!reset) cover (rvfi_valid && !rvfi_trap);

[verilog-files]
# run_all.sh rebuilds this section from the actual rtl/ glob; the list
# below is overwritten before genchecks runs. Kept as a placeholder so
# the section is syntactically present for any reader inspecting the cfg.
@basedir@/cores/@core@/core.sv
@basedir@/cores/@core@/wrapper.sv
